<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工時紀錄器</title>
<style>
body{font-family:Arial,sans-serif;max-width:1400px;margin:auto;padding:20px}
.row{display:flex;gap:10px;margin:8px 0}
input,select,button{padding:8px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
.hidden{display:none}
.summary{margin-top:20px;line-height:1.8;font-weight:bold}
</style>
</head>
<body>

<h2>工時紀錄器</h2>

<div class="row">
<label>日期</label>
<input type="date" id="date">
</div>

<div class="row">
<label>類型</label>
<select id="type" onchange="toggleMode()">
<option value="normal">正常出勤</option>
<option value="special">特別假</option>
<option value="leave">請假</option>
</select>
</div>

<div id="normalSection">
<div class="row">
<label>出勤</label>
<select id="startType">
<option>內勤</option>
<option>高鐵</option>
<option>轎車</option>
</select>
<input type="time" id="startTime">
</div>

<div class="row">
<label>退勤</label>
<select id="endType">
<option>內勤</option>
<option>高鐵</option>
<option>轎車</option>
</select>
<input type="time" id="endTime">
</div>
</div>

<div class="row">
<label>備註</label>
<input
type="text"
id="note"
placeholder="例如：台南出差、教育訓練、客戶拜訪">
</div>
    
<div id="leaveSection" class="hidden">
<div class="row">
<label>時數</label>
<input type="number" min="1" max="8" step="1" id="leaveHours">
</div>
</div>

<button onclick="addRecord()">新增紀錄</button>
<button onclick="exportCSV()">匯出Excel</button>
    
<table>
<thead>
<tr>
<th>日期</th>
<th>類型</th>
<th>出勤</th>
<th>退勤</th>
<th>提早出勤</th>
<th>延後出勤</th>
<th>認列工時</th>
<th>備註</th>
<th>刪除</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>

<div class="summary">
<div>總認列工時：<span id="totalWork">0分鐘</span></div>
<div>平均工時(正常出勤)：<span id="avgWork">0分鐘</span></div>
<div>總特別假：<span id="totalSpecial">0小時</span></div>
<div>總請假：<span id="totalLeave">0小時</span></div>
<div>累計提早出勤：<span id="totalEarly">0分鐘</span></div>
<div>累計延後出勤：<span id="totalLate">0分鐘</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtxfR46Pi-wZznaZyLK1jlPwb84IqlD-s",
  authDomain: "work-time-5a318.firebaseapp.com",
  projectId: "work-time-5a318",
  storageBucket: "work-time-5a318.firebasestorage.app",
  messagingSenderId: "950231535149",
  appId: "1:950231535149:web:612b9300f52b51184fb2a4",
  measurementId: "G-DD2YGESBY9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;

console.log("Firebase 已連線");
</script>
    
<script>
let data = JSON.parse(
    localStorage.getItem("workRecords") || "[]"
);

function toggleMode(){
 const t=document.getElementById('type').value;
 document.getElementById('normalSection').classList.toggle('hidden',t!=='normal');
 document.getElementById('leaveSection').classList.toggle('hidden',t==='normal');
}

function tm(v){
 const [h,m]=v.split(':').map(Number);
 return h*60+m;
}

function fmt(min){
 if(min<=0)return "0分鐘";
 let h=Math.floor(min/60),m=min%60;
 if(h===0)return m+"分鐘";
 if(m===0)return h+"小時";
 return h+"小時"+m+"分鐘";
}

function addRecord(){
console.log("addRecord開始");
    
 const date=document.getElementById('date').value;
 const type=document.getElementById('type').value;
 if(!date){alert('請選日期');return;}

 if(type!=='normal'){
   const hrs=parseInt(document.getElementById('leaveHours').value||0);
   if(!hrs){alert('請輸入時數');return;}
   data.push({date,type,hours:hrs});
   render();
   return;
 }

 const st=document.getElementById('startType').value;
 const et=document.getElementById('endType').value;
 const s=document.getElementById('startTime').value;
 const e=document.getElementById('endTime').value;
 const note=document.getElementById('note').value;
 if(!s||!e){alert('請輸入時間');return;}

 let start=tm(s), end=tm(e);
 let adjStart=start, adjEnd=end;

 if(st==="高鐵" && start<510) adjStart-=30;
 if(et==="高鐵" && end>1050) adjEnd+=30;

 let work = adjEnd - adjStart;

if(work < 0){
    work += 1440;
}

if(work > 540){
    work -= 60;
}

 let early=Math.max(0,510-adjStart);
 let late=Math.max(0,adjEnd-1050);

data.push({
  date,
  type:'normal',
  st,
  et,
  s,
  e,
  note,
  early,
  late,
  work
});

console.log("準備寫入Firestore");
    
window.addDoc(
  window.collection(window.db,"records"),
  {
    date,
    type:'normal',
    st,
    et,
    s,
    e,
    note,
    early,
    late,
    work
  }
)
.then(()=>console.log("Firestore寫入成功"))
.catch(err=>console.error(err));
render();
}

function del(i){
 data.splice(i,1);
 render();
}

function render(){
    
data.sort((a,b)=>new Date(b.date)-new Date(a.date));  
    
 let html='';
 let totalWork=0,totalEarly=0,totalLate=0;
 let normalDays=0,special=0,leave=0;

 data.forEach((r,i)=>{
   if(r.type==='normal'){
      totalWork+=r.work;
      totalEarly+=r.early;
      totalLate+=r.late;
      normalDays++;

      html+=`<tr>
<td>${r.date}</td>
<td>正常出勤</td>
<td>${r.st} ${r.s}</td>
<td>${r.et} ${r.e}</td>
<td>${fmt(r.early)}</td>
<td>${fmt(r.late)}</td>
<td>${fmt(r.work)}</td>
<td>${r.note || ''}</td>
<td><button onclick="del(${i})">❌</button></td>

</tr>`;
}else if(r.type==='special'){
    special+=r.hours;

    html+=`<tr>
    <td>${r.date}</td>
    <td>特別假</td>

    <td>-</td>
    <td>-</td>

    <td>-</td>
    <td>-</td>

    <td>0分鐘</td>

    <td></td>

    <td><button onclick="del(${i})">❌</button></td>
    </tr>`;

}else{
    leave+=r.hours;

    html+=`<tr>
    <td>${r.date}</td>
    <td>請假</td>

    <td>-</td>
    <td>-</td>

    <td>-</td>
    <td>-</td>

    <td>0分鐘</td>

    <td></td>

    <td><button onclick="del(${i})">❌</button></td>
    </tr>`;
}
 });

 document.getElementById('records').innerHTML=html;
 document.getElementById('totalWork').textContent=fmt(totalWork);
 document.getElementById('avgWork').textContent=fmt(normalDays?Math.round(totalWork/normalDays):0);
 document.getElementById('totalSpecial').textContent=special+'小時';
 document.getElementById('totalLeave').textContent=leave+'小時';
 document.getElementById('totalEarly').textContent=fmt(totalEarly);
 document.getElementById('totalLate').textContent=fmt(totalLate);
 localStorage.setItem(
    "workRecords",
    JSON.stringify(data)
);
}

render();

    function exportCSV(){

 let rows = [
   ["日期","類型","內容","備註","提早出勤","延後出勤","認列工時"]
 ];

 data.forEach(r=>{

   rows.push([
     r.date || "",
     r.type || "",
     `${r.st || ""} ${r.s || ""} → ${r.et || ""} ${r.e || ""}`,
     r.note || "",
     r.early || 0,
     r.late || 0,
     r.work || r.hours || 0
   ]);

 });

 const csv =
 "\uFEFF" +
 rows.map(r=>r.join(",")).join("\n");

 const blob = new Blob(
   [csv],
   {type:"text/csv;charset=utf-8;"}
 );

 const link =
 document.createElement("a");

 link.href =
 URL.createObjectURL(blob);

 link.download =
 "工時紀錄.csv";

 link.click();
}
    
</script>

</body>
</html>
