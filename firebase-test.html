<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>е·ҘжҷӮзҙҖйҢ„еҷЁ</title>
<style>
body{font-family:Arial,sans-serif;max-width:1400px;margin:auto;padding:20px}
.row{display:flex;gap:10px;margin:8px 0}
input,select,button{padding:8px}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
.hidden{display:none}
.summary{margin-top:20px;line-height:1.8;font-weight:bold}
</style>
</head>
<body>

<h2>е·ҘжҷӮзҙҖйҢ„еҷЁ</h2>

<div class="row">
<label>зөұиЁҲжңҲд»Ҫ</label>
<input type="month" id="filterMonth" onchange="render()">
</div>
    
<div class="row">
<label>ж—Ҙжңҹ</label>
<input type="date" id="date">
</div>

<div class="row">
<label>йЎһеһӢ</label>
<select id="type" onchange="toggleMode()">
<option value="normal">жӯЈеёёеҮәеӢӨ</option>
<option value="special">зү№еҲҘеҒҮ</option>
<option value="leave">и«ӢеҒҮ</option>
</select>
</div>

<div id="normalSection">
<div class="row">
<label>еҮәеӢӨ</label>
<select id="startType">
<option>е…§еӢӨ</option>
<option>й«ҳйҗө</option>
<option>иҪҺи»Ҡ</option>
</select>
<input type="time" id="startTime">
</div>

<div class="row">
<label>йҖҖеӢӨ</label>
<select id="endType">
<option>е…§еӢӨ</option>
<option>й«ҳйҗө</option>
<option>иҪҺи»Ҡ</option>
</select>
<input type="time" id="endTime">
</div>
</div>

<div class="row">
<label>еӮҷиЁ»</label>
<input
type="text"
id="note"
placeholder="дҫӢеҰӮпјҡеҸ°еҚ—еҮәе·®гҖҒж•ҷиӮІиЁ“з·ҙгҖҒе®ўжҲ¶жӢңиЁӘ">
</div>
    
<div id="leaveSection" class="hidden">
<div class="row">
<label>жҷӮж•ё</label>
<input type="number" min="1" max="8" step="1" id="leaveHours">
</div>
</div>

<button onclick="addRecord()">ж–°еўһзҙҖйҢ„</button>
<button onclick="exportCSV()">еҢҜеҮәExcel</button>
    
<table>
<thead>
<tr>
<th>ж—Ҙжңҹ</th>
<th>йЎһеһӢ</th>
<th>еҮәеӢӨ</th>
<th>йҖҖеӢӨ</th>
<th>жҸҗж—©еҮәеӢӨ</th>
<th>е»¶еҫҢеҮәеӢӨ</th>
<th>иӘҚеҲ—е·ҘжҷӮ</th>
<th>и«ӢеҒҮжҷӮж•ё</th>
<th>еӮҷиЁ»</th>
<th>еҲӘйҷӨ</th>
</tr>
</thead>
<tbody id="records"></tbody>
</table>

<div class="summary">
<div>зёҪиӘҚеҲ—е·ҘжҷӮпјҡ<span id="totalWork">0еҲҶйҗҳ</span></div>
<div>е№іеқҮе·ҘжҷӮ(жӯЈеёёеҮәеӢӨ)пјҡ<span id="avgWork">0еҲҶйҗҳ</span></div>
<div>зёҪзү№еҲҘеҒҮпјҡ<span id="totalSpecial">0е°ҸжҷӮ</span></div>
<div>зёҪи«ӢеҒҮпјҡ<span id="totalLeave">0е°ҸжҷӮ</span></div>
<div>зҙҜиЁҲжҸҗж—©еҮәеӢӨпјҡ<span id="totalEarly">0еҲҶйҗҳ</span></div>
<div>зҙҜиЁҲе»¶еҫҢеҮәеӢӨпјҡ<span id="totalLate">0еҲҶйҗҳ</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtxfR46Pi-wZznaZyLK1jlPwb84IqlD-s",
  authDomain: "work-time-5a318.firebaseapp.com",
  projectId: "work-time-5a318",
  storageBucket: "work-time-5a318.firebasestorage.app",
  messagingSenderId: "950231535149",
  appId: "1:950231535149:web:612b9300f52b51184fb2a4",
  measurementId: "G-DD2YGESBY9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;

window.deleteDoc = deleteDoc;
window.doc = doc;

console.log("Firebase е·ІйҖЈз·ҡ");
</script>
    
<script>
let data = JSON.parse(
    localStorage.getItem("workRecords") || "[]"
);

function toggleMode(){
 const t=document.getElementById('type').value;
 document.getElementById('normalSection').classList.toggle('hidden',t!=='normal');
 document.getElementById('leaveSection').classList.toggle('hidden',t==='normal');
}

function tm(v){
 const [h,m]=v.split(':').map(Number);
 return h*60+m;
}

function fmt(min){
 if(min<=0)return "0еҲҶйҗҳ";
 let h=Math.floor(min/60),m=min%60;
 if(h===0)return m+"еҲҶйҗҳ";
 if(m===0)return h+"е°ҸжҷӮ";
 return h+"е°ҸжҷӮ"+m+"еҲҶйҗҳ";
}

function addRecord(){
console.log("addRecordй–Ӣе§Ӣ");
    
 const date=document.getElementById('date').value;
 const type=document.getElementById('type').value;
 if(!date){alert('и«ӢйҒёж—Ҙжңҹ');return;}

if(type!=='normal'){
const note =
document.getElementById('note').value;
    
   const hrs=parseInt(document.getElementById('leaveHours').value||0);

   if(!hrs){
      alert('и«Ӣијёе…ҘжҷӮж•ё');
      return;
   }

   data.push({
   date,
   type,
   hours:hrs,
   note
});

   window.addDoc(
  window.collection(window.db,"records"),
  {
     date,
     type,
     hours:hrs,
     note
  }
);
   render();
   return;
}

 const st=document.getElementById('startType').value;
 const et=document.getElementById('endType').value;
 const s=document.getElementById('startTime').value;
 const e=document.getElementById('endTime').value;
 const note=document.getElementById('note').value;
 if(!s||!e){alert('и«Ӣијёе…ҘжҷӮй–“');return;}

 let start=tm(s), end=tm(e);
 let adjStart=start, adjEnd=end;

 if((st==="й«ҳйҗө" || st==="иҪҺи»Ҡ") && start<510) adjStart-=30;
 if((et==="й«ҳйҗө" || et==="иҪҺи»Ҡ") && end>1050) adjEnd+=30;

 let work = adjEnd - adjStart;

if(work < 0){
    work += 1440;
}

if(work > 540){
    work -= 60;
}

 let early=Math.max(0,510-adjStart);
 let late=Math.max(0,adjEnd-1050);

data.push({
  date,
  type:'normal',
  st,
  et,
  s,
  e,
  note,
  early,
  late,
  work
});

console.log("жә–еӮҷеҜ«е…ҘFirestore");
    
window.addDoc(
  window.collection(window.db,"records"),
  {
    date,
    type:'normal',
    st,
    et,
    s,
    e,
    note,
    early,
    late,
    work
  }
)
.then(()=>console.log("FirestoreеҜ«е…ҘжҲҗеҠҹ"))
.catch(err=>console.error(err));
render();
}

async function del(i){

  await window.deleteDoc(
    window.doc(
      window.db,
      "records",
      data[i].id
    )
  );

  data.splice(i,1);

  render();
}

function render(){

const filterMonth =
document.getElementById('filterMonth')?.value || '';
    
data.sort((a,b)=>
  new Date(b.date || 0) -
  new Date(a.date || 0)
);
    
 let html='';
 let totalWork=0,totalEarly=0,totalLate=0;
 let normalDays=0,special=0,leave=0;

 data.forEach((r,i)=>{

  if(
    filterMonth &&
    !r.date?.startsWith(filterMonth)
  ){
    return;
  }
   if(r.type==='normal'){
      totalWork+=r.work;
      totalEarly+=r.early;
      totalLate+=r.late;
      normalDays++;

      html+=`<tr>
<td>${r.date}</td>
<td>жӯЈеёёеҮәеӢӨ</td>
<td>${r.st} ${r.s}</td>
<td>${r.et} ${r.e}</td>
<td>${fmt(r.early)}</td>
<td>${fmt(r.late)}</td>
<td>${fmt(r.work)}</td>
<td>-</td>
<td>${r.note || ''}</td>
<td><button onclick="del(${i})">вқҢ</button></td>

</tr>`;
}else if(r.type==='special'){
    special+=r.hours;

    html+=`<tr>
    <td>${r.date}</td>
    <td>зү№еҲҘеҒҮ</td>

    <td>-</td>
    <td>-</td>

    <td>-</td>
    <td>-</td>

    <td>0еҲҶйҗҳ</td>

<td>${r.hours}е°ҸжҷӮ</td>

<td>${r.note || ''}</td>

<td><button onclick="del(${i})">вқҢ</button></td>
    </tr>`;

}else{
    leave+=r.hours;

    html+=`<tr>
    <td>${r.date}</td>
    <td>и«ӢеҒҮ</td>

    <td>-</td>
    <td>-</td>

    <td>-</td>
    <td>-</td>

    <td>0еҲҶйҗҳ</td>

<td>${r.hours}е°ҸжҷӮ</td>

<td>${r.note || ''}</td>

<td><button onclick="del(${i})">вқҢ</button></td>
    </tr>`;
}
 });

 document.getElementById('records').innerHTML=html;
 document.getElementById('totalWork').textContent=fmt(totalWork);
 document.getElementById('avgWork').textContent=fmt(normalDays?Math.round(totalWork/normalDays):0);
 document.getElementById('totalSpecial').textContent=special+'е°ҸжҷӮ';
 document.getElementById('totalLeave').textContent=leave+'е°ҸжҷӮ';
 document.getElementById('totalEarly').textContent=fmt(totalEarly);
 document.getElementById('totalLate').textContent=fmt(totalLate);
 localStorage.setItem(
    "workRecords",
    JSON.stringify(data)
);
}

async function loadFirebase(){

  console.log("й–Ӣе§Ӣи®ҖеҸ–Firebase");


  const snapshot =
    await window.getDocs(
      window.collection(window.db,"records")
    );

  data = [];

  snapshot.forEach(doc=>{

  data.push({
    id: doc.id,
    ...doc.data()
  });

});
  render();

}

window.onload = function() {
  loadFirebase();
};

    function exportCSV(){

 let rows = [
   ["ж—Ҙжңҹ","йЎһеһӢ","е…§е®№","еӮҷиЁ»","жҸҗж—©еҮәеӢӨ","е»¶еҫҢеҮәеӢӨ","иӘҚеҲ—е·ҘжҷӮ"]
 ];

const filterMonth =
document.getElementById("filterMonth").value;
        
data.forEach(r=>{

    if(
      filterMonth &&
      !r.date?.startsWith(filterMonth)
    ){
      return;
    }

    rows.push([
     r.date || "",
     r.type || "",
     `${r.st || ""} ${r.s || ""} вҶ’ ${r.et || ""} ${r.e || ""}`,
     r.note || "",
     r.early || 0,
     r.late || 0,
     r.work || r.hours || 0
   ]);

 });

 const csv =
 "\uFEFF" +
 rows.map(r=>r.join(",")).join("\n");

 const blob = new Blob(
   [csv],
   {type:"text/csv;charset=utf-8;"}
 );

 const link =
 document.createElement("a");

 link.href =
 URL.createObjectURL(blob);

 link.download =
 "е·ҘжҷӮзҙҖйҢ„.csv";

 link.click();
}
    
</script>

</body>
</html>
